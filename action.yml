name: 'Setup Omnistrate CTL'
description:
  'Wraps the Omnistrate CTL command line to deploy and operate Omnistrate
  services'
author: 'Omnistrate'

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: 'command'
  color: 'green'

# Define your inputs here.
inputs:
  email:
    description: 'User email'
    required: false
  password:
    description: 'User password'
    required: false
  version:
    description: |-
      Version of Omnistrate CTL to install. If unspecified or set to "latest",
      the latest version for the target platform will be installed.
    required: false
    default: 'latest'
  logout:
    description: |-
      Whether to run "omnistrate-ctl logout" in the post step to remove
      the temporary access token from the runner. Defaults to "false".
    required: false
    default: 'false'

runs:
  using: node20
  main: dist/install/index.js
  post: dist/post/index.js
