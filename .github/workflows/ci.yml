name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action
        id: test-action
        uses: ./

      - name: Test Local Action CTL
        run: |
          omnistrate-ctl --version
          omctl --help

  test-action-with-version:
    name: GitHub Actions Test with Version

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action with Version
        id: test-action-with-latest
        uses: ./
        with:
          version: v0.13.28

      - name: Test Local Action CTL
        run: |
          omnistrate-ctl --version
          omctl --help

  test-action-with-email-and-password:
    name: GitHub Actions Test with Email and Password

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action with Email and Password
        id: test-action-with-email-and-password
        uses: ./
        with:
          email: ${{ secrets.OMNISTRATE_ACCOUNT_EMAIL }}
          password: '${{ secrets.OMNISTRATE_ACCOUNT_PASSWORD }}'

      - name: Test Local Action CTL
        run: |
          omnistrate-ctl --version
          omctl --help

  test-action-logout:
    name: GitHub Actions Test Logout

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Login with logout enabled
        id: test-action-login
        uses: ./
        with:
          email: ${{ secrets.OMNISTRATE_ACCOUNT_EMAIL }}
          password: '${{ secrets.OMNISTRATE_ACCOUNT_PASSWORD }}'
          logout: true

      - name: Verify token exists after login
        shell: bash
        run: |
          if [ ! -d "$HOME/.omnistrate" ]; then
            echo "::error::Expected ~/.omnistrate/ to exist"
            exit 1
          fi
          echo "✓ ~/.omnistrate/ exists after login"

      # Post step runs "omnistrate-ctl logout" because logout: true

  test-action-no-logout:
    name: GitHub Actions Test No Logout

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Login without logout
        id: test-action-no-logout
        uses: ./
        with:
          email: ${{ secrets.OMNISTRATE_ACCOUNT_EMAIL }}
          password: '${{ secrets.OMNISTRATE_ACCOUNT_PASSWORD }}'

      - name: Verify token exists (post step skipped)
        shell: bash
        run: |
          if [ ! -d "$HOME/.omnistrate" ]; then
            echo "::error::Expected ~/.omnistrate/ to exist"
            exit 1
          fi
          echo "✓ ~/.omnistrate/ exists (no logout, token retained)"
